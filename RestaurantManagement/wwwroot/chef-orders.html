<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD Restaurant - Chef | Order Kitchen Board</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200..1000&family=Open+Sans:wght@300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/chef-orders.css">
</head>

<body>
    <nav class="chef-navbar">
        <div class="navbar-inner">
            <a href="BDrestaurant.html" class="navbar-brand-link">
                <img src="./assets/images/logo.png" alt="Logo" class="navbar-logo">
                <span class="navbar-brand-name">BD Restaurant - Chef Panel</span>
            </a>
            <div class="chef-info">
                <i class="fa-solid fa-hat-chef"></i>
                <span id="chefName">Chef</span>
                <button class="logout-btn" id="logoutBtn">
                    <i class="fa-solid fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="chef-container">
        <div class="chef-header">
            <h1><i class="fa-solid fa-kitchen-set"></i> Order Kitchen Board</h1>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div class="auto-refresh">
                    <i class="fa-solid fa-sync-alt"></i>
                    <span>Auto refresh every 30s</span>
                </div>
                <button class="refresh-btn" id="refreshBtn">
                    <i class="fa-solid fa-refresh"></i> Refresh Now
                </button>
            </div>
        </div>

        <!-- Legend -->
        <div class="legend">
            <div class="legend-item">
                <span class="legend-color urgent"></span>
                <span>Urgent (> 30 min)</span>
            </div>
            <div class="legend-item">
                <span class="legend-color warning"></span>
                <span>Warning (10-30 min)</span>
            </div>
            <div class="legend-item">
                <span class="legend-color normal"></span>
                <span>Normal (< 10 min)</span>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-btn active" data-filter="all">All Orders</button>
            <button class="filter-btn" data-filter="pending">Pending Orders</button>
            <button class="filter-btn" data-filter="processing">Processing Orders</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="loading-state">
            <div class="spinner-custom"></div>
            <p>Loading orders...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <i class="fa-solid fa-check-circle" style="font-size: 48px; color: var(--dark-green);"></i>
            <p>No orders to process. Great job!</p>
        </div>

        <!-- Orders Grid -->
        <div class="orders-grid" id="ordersGrid"></div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="modal-custom">
        <div class="modal-content-custom">
            <h3>Confirm Action</h3>
            <p id="confirmMessage">Are you sure?</p>
            <div class="modal-buttons">
                <button id="confirmYes" class="btn-confirm">Yes</button>
                <button id="confirmNo" class="btn-cancel">No</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/chef-orders.js"></script>
</body>

</html>

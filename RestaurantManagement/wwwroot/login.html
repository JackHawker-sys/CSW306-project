<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD - Restaurant | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/login.css">
    <script src="./assets/js/login.js" defer></script>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <img src="./assets/images/logo.png" alt="BD Restaurant Logo">
            </div>
            <h1>BD Restaurant</h1>
            <p id="headerSubtitle">Sign in to continue</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <div class="password-footer">
                <button type="button" class="forgot-link" id="forgot-link">
                    Forgot password?
                </button>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span class="spinner" id="spinner"></span>
                <span id="btnText">Sign In</span>
            </button>
        </form>

        <!-- Forgot Password Email Form (Hidden by default) -->
        <form id="forgotPasswordEmailForm" style="display: none;">
            <div class="form-group">
                <label for="forgotEmail"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="forgotEmail" name="email" placeholder="Enter your email address" required>
                <small class="form-text text-muted">We'll send a verification code to this email</small>
            </div>

            <button type="submit" class="login-btn" id="sendCodeBtn">
                <span class="spinner" id="spinnerForgot"></span>
                <span id="btnTextForgot">Send Verification Code</span>
            </button>

            <button type="button" class="login-btn back-btn" id="backBtn" style="margin-top: 10px; background-color: #666;">
                Back to Login
            </button>
        </form>

        <div class="signup-link">
            <p>Don't have an account? <a href="signup.html">Register now</a></p>
            <p>Need to activate your account? <a href="activate.html">Activate here</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

﻿<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>BD - Restaurant | Menu</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="./assets/css/menu.css">
        <link rel="stylesheet" href="./assets/css/cart.css">
    </head>

    <body>

        <!-- Navbar -->
        <nav class="menu-navbar">
            <div class="navbar-inner">
                <a href="BDrestaurant.html" class="navbar-brand-link">
                    <img src="./assets/images/logo.png" alt="BD Restaurant Logo" class="navbar-logo">
                    <span class="navbar-brand-name">BD Restaurant</span>
                </a>
                <a href="BDrestaurant.html" class="back-btn">
                    <i class="fa-solid fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </nav>

        <!-- Hero Banner -->
        <section class="menu-hero">
            <div class="menu-hero-overlay"></div>
            <div class="menu-hero-content">
                <h1>Our Menu</h1>
                <p>Fresh ingredients, crafted with passion</p>
            </div>
        </section>

        <!-- Main Content -->
        <main class="menu-main">
            <div class="menu-container">

                <!-- Search & Filter Bar -->
                <div class="menu-toolbar">
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchInput" placeholder="Search dishes..." autocomplete="off">
                    </div>
                    <div class="menu-count-label">
                        <span id="menuCount">0</span> dishes available
                    </div>

                    <button id="orderActionBtn" class="btn-start-order" style="display: none;">
                        Order
                    </button>
                </div>

                <!-- Loading State -->
                <div id="loadingState" class="loading-state">
                    <div class="spinner-border-custom"></div>
                    <p>Loading menu...</p>
                </div>

                <!-- Error State -->
                <div id="errorState" class="error-state" style="display:none;">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <p id="errorMsg">Could not load menu. Please try again.</p>
                    <button onclick="loadMenu()" class="retry-btn">Retry</button>
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="empty-state" style="display:none;">
                    <i class="fa-solid fa-bowl-food"></i>
                    <p>No dishes found.</p>
                </div>

                <!-- Menu Grid -->
                <div class="menu-grid" id="menuGrid"></div>

            </div>
        </main>

        <!-- Food Detail Modal -->
        <div class="modal fade" id="foodModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content food-modal-content">
                    <button type="button" class="modal-close-btn" data-bs-dismiss="modal" aria-label="Close">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                    <div class="modal-body-custom">
                        <div class="modal-img-wrap">
                            <img id="modalImg" src="" alt="">
                            <div class="modal-img-overlay"></div>
                        </div>
                        <div class="modal-info">
                            <h2 id="modalName"></h2>
                            <div class="modal-price-badge">
                                <i class="fa-solid fa-tag"></i>
                                <span id="modalPrice"></span>
                            </div>
                            <p id="modalDesc" class="modal-desc"></p>
                            <div class="modal-actions">
                                <button class="modal-order-btn">
                                    <i class="fa-solid fa-cart-plus"></i> Order Now
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Cart Icon & Sidebar -->
        <div class="cart-icon" id="cartIcon">
            <i class="fa-solid fa-bag-shopping"></i>
            <span class="cart-badge" id="cartBadge">0</span>
        </div>

        <div class="cart-overlay" id="cartOverlay"></div>

        <div class="cart-sidebar" id="cartSidebar">
            <div class="cart-header">
                <h3><i class="fa-solid fa-bag-shopping"></i> Your Cart</h3>
                <button class="close-cart" id="closeCartBtn">&times;</button>
            </div>
            <div class="cart-items" id="cartItems">
                <div class="empty-cart">
                    <i class="fa-solid fa-basket-shopping"></i>
                    <p>Your cart is empty</p>
                </div>
            </div>
            <div class="cart-footer" id="cartFooter" style="display: none;">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cartTotal">$0.00</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn">Order</button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="menu-footer">
            <p>© BD Restaurant. All Rights Reserved.</p>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="./assets/js/cart.js"></script>
        <script src="./assets/js/menu.js"></script>
    </body>

</html>

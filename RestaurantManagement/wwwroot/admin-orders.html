<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD Restaurant - Admin | Order Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200..1000&family=Open+Sans:wght@300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/admin-orders.css">
</head>

<body>
    <nav class="admin-navbar">
        <div class="navbar-inner">
            <a href="BDrestaurant.html" class="navbar-brand-link">
                <img src="./assets/images/logo.png" alt="Logo" class="navbar-logo">
                <span class="navbar-brand-name">BD Restaurant - Admin Panel</span>
            </a>
            <div>
                <a href="BDrestaurant.html" class="back-btn">
                    <i class="fa-solid fa-arrow-left"></i> Home
                </a>
                <button class="logout-btn" id="logoutBtn">
                    <i class="fa-solid fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fa-solid fa-receipt"></i> Order Management</h1>
            <button id="refreshBtn" class="refresh-btn">
                <i class="fa-solid fa-refresh"></i> Refresh
            </button>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <i class="fa-solid fa-clock"></i>
                <h3 id="pendingCount">0</h3>
                <p>Pending Orders</p>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-check-circle"></i>
                <h3 id="completedCount">0</h3>
                <p>Completed Orders</p>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-dollar-sign"></i>
                <h3 id="paidCount">0</h3>
                <p>Paid Orders</p>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-chart-line"></i>
                <h3 id="totalRevenue">₫0</h3>
                <p>Total Revenue</p>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-btn active" data-filter="all">All Orders</button>
            <button class="filter-btn" data-filter="pending">Pending (Unpaid)</button>
            <button class="filter-btn" data-filter="paid">Paid</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <!-- Orders Table -->
        <div class="orders-table-container">
            <table class="orders-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Order Date</th>
                        <th>Total Amount</th>
                        <th>Payment Status</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody">
                    <tr>
                        <td colspan="7" class="loading">
                            <div class="spinner-custom"></div>
                            <p>Loading orders...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Order Detail Modal -->
    <div id="orderDetailModal" class="modal-custom">
        <div class="modal-content-custom">
            <div class="modal-header-custom">
                <h3><i class="fa-solid fa-receipt"></i> Order Details</h3>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody">
                <div class="loading">
                    <div class="spinner-custom"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/admin-orders.js"></script>
</body>

</html>

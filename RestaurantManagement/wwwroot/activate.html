<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD - Restaurant | Activate Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/activate.css">
    <script src="./assets/js/activate.js" defer></script>
</head>

<body>
    <div class="activate-container">
        <div class="activate-header">
            <div class="logo">
                <img src="./assets/images/logo.png" alt="BD Restaurant Logo">
            </div>
            <h1>BD Restaurant</h1>
            <p>Activate your account</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="activateForm">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="activationCode"><i class="fas fa-key"></i> Activation Code</label>
                <input type="text" id="activationCode" name="activationCode" placeholder="Enter your activation code" required>
            </div>

            <button type="submit" class="activate-btn" id="activateBtn">
                <span class="spinner" id="spinner"></span>
                <span id="btnText">Activate Account</span>
            </button>
        </form>

        <div class="login-link">
            <p>Already activated? <a href="login.html">Sign in</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

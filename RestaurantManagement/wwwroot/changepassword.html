<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD - Restaurant | Change Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/changepassword.css">
    <script src="./assets/js/Changepassword.js" defer></script>
</head>

<body>
    <div class="changepassword-container">
        <div class="changepassword-header">
            <div class="logo">
                <img src="./assets/images/logo.png" alt="BD Restaurant Logo">
            </div>
            <h1>BD Restaurant</h1>
            <p>Reset Your Password</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="changePasswordForm">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required disabled>
                <small class="form-text text-muted">This email was used to send your verification code</small>
            </div>

            <div class="form-group">
                <label for="activeCode"><i class="fas fa-key"></i> Verification Code</label>
                <input type="text" id="activeCode" name="activeCode" placeholder="Enter the code sent to your email" required>
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> New Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your new password" required>
                <small class="form-text text-muted">Password must be at least 6 characters</small>
            </div>

            <div class="form-group">
                <label for="confirmPassword"><i class="fas fa-lock"></i> Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your new password" required>
            </div>

            <button type="submit" class="changepassword-btn" id="changePasswordBtn">
                <span class="spinner" id="spinner"></span>
                <span id="btnText">Reset Password</span>
            </button>
        </form>

        <div class="footer-links">
            <p>Remember your password? <a href="login.html">Back to Login</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
